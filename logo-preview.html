<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { margin: 0; background: #f5f0ea; display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 40px; }
  .on-dark { background: #1d1916; padding: 48px 64px; }
  .on-terra { background: #b8714a; padding: 48px 64px; }
  .on-light { background: #f5f0ea; padding: 48px 64px; }
</style>
</head>
<body>
  <div class="on-light">
    <img src="tutti-logo.svg" width="520" height="200">
  </div>
  <div class="on-dark">
    <img src="tutti-logo.svg" width="520" height="200" style="filter: invert(1) brightness(0.88);">
  </div>
  <div class="on-terra">
    <img src="tutti-logo.svg" width="520" height="200" style="filter: invert(1) brightness(0.9);">
  </div>
</body>
</html>
